<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control: Earth vs. Aliens</title>
    <link rel="stylesheet" href="public/css/style.css">
    <link rel="stylesheet" href="public/css/animations.css">
    <link rel="stylesheet" href="public/css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <!-- HUD -->
    <header class="top-bar">
        <div class="hud-box">
            <h3>SCORE</h3>
            <p id="score">0</p>
        </div>
        <div class="title-box">
            <h1>🚀 Mission Control</h1>
            <h2>Earth vs. Aliens</h2>
        </div>
        <div class="hud-box">
            <h3>EARTH HEALTH</h3>
            <p id="health">100%</p>
        </div>
    </header>

    <!-- Full screen battle area -->
    <div class="battle-scene">
        <!-- Alien ship - moves freely across screen -->
        <div id="alienShipWrapper">
            <canvas id="alienCanvas" width="160" height="160"></canvas>
        </div>

        <!-- Earth - fixed right -->
        <div id="earthWrapper">
            <canvas id="earthCanvas" width="180" height="180"></canvas>
            <div id="explosionRing"></div>
        </div>
    </div>

    <!-- Question Box -->
    <div class="question-area">
        <div class="question-box">
            <div class="question-header">
                <span class="question-number" id="questionNum">01 / 05</span>
            </div>
            <h2 id="question">Which planet is known as the Red Planet?</h2>
            <div class="answers">
                <button class="answer-btn">Mars</button>
                <button class="answer-btn">Venus</button>
                <button class="answer-btn">Jupiter</button>
                <button class="answer-btn">Mercury</button>
            </div>
        </div>
    </div>

    <script src="public/js/questions.js"></script>
    <script src="public/js/game.js"></script>
    <script src="public/js/ui.js"></script>
    <script src="public/js/3d.js"></script>
    <script src="public/js/main.js"></script>
</body>
</html>
